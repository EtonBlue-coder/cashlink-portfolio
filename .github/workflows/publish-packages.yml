name: Publier les packages Docker

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Nom du repo en minuscules (requis par ghcr.io)
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et push — image backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LC }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.REPO_LC }}-backend:${{ github.event.release.tag_name || 'manual' }}

      - name: Build et push — image frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          build-args: |
            VITE_API_URL=http://localhost:8000
            VITE_DEMO_MODE=false
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LC }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.REPO_LC }}-frontend:${{ github.event.release.tag_name || 'manual' }}
