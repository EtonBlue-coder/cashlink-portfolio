services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
        VITE_DEMO_MODE: "false"
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  backend_data:
